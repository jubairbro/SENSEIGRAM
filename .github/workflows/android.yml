name: SenseiGram CI/CD

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: ${{ runner.os }}-gradle-

    - name: Run Lint
      run: ./gradlew lintDebug --continue || true

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: senseigram-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 14

  release:
    name: Release APK
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Rename APK
      run: mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/SenseiGram-${{ github.ref_name }}.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/release/SenseiGram-${{ github.ref_name }}.apk
        name: SenseiGram ${{ github.ref_name }}
        generate_release_notes: true
        body: |
          ## SenseiGram ${{ github.ref_name }}

          ### What's included
          - 50+ Telegram Bot management features
          - Send text, photos, videos, documents
          - Visual inline keyboard builder with color styles
          - Silent messages & content protection
          - Media spoiler support
          - Saved chats & drafts system
          - Material Design 3 UI
          - WebApp (Mini App) example included

          ### Install
          Download `SenseiGram-${{ github.ref_name }}.apk` below and install on your Android device.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
