<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenseiGram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            text-align: center;
            padding: 20px;
        }
        button {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Welcome to SenseiGram WebApp! 🚀</h1>
    <p>This is a native Telegram Mini App.</p>
    <p>Your user data: <span id="user-info">Loading...</span></p>

    <button onclick="sendDataBack()">Send Data to Bot</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Show User Data
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-info').innerText = tg.initDataUnsafe.user.first_name;
        }

        // Send data back to the bot
        function sendDataBack() {
            tg.sendData(JSON.stringify({ action: "test", message: "Hello from SenseiGram WebApp!" }));
            tg.close();
        }
    </script>
</body>
</html>
